name: dashboard-tick
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.ref }}
  cancel-in-progress: false
jobs:
  dispatch:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Dispatch harness hook
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || '' }}
        run: |
          echo "Regenerate pinned status issue from metrics and GitHub state."
          bash scripts/runner/dispatch.sh dashboard-tick
