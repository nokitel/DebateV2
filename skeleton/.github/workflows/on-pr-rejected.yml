name: on-pr-rejected
on:
  workflow_dispatch:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.ref }}
  cancel-in-progress: false
jobs:
  dispatch:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Dispatch harness hook
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || '' }}
        run: |
          echo "If pull_request.closed && !merged, move sub-issue to Rejected and run deep lessons."
          bash scripts/runner/dispatch.sh on-pr-rejected
